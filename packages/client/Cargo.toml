[package]
name = "pleasync-client"
version = "0.1.0"
description = "Pleasanter API client — Rust + Node.js (napi-rs) + Python (PyO3)"
edition = "2021"
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# HTTP クライアント: reqwest（async）+ rustls-tls（純粋 Rust TLS）
# native-tls は OpenSSL に依存しており、napi-rs の tokio ランタイムでブロッキングする問題があるため rustls を使用
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
napi = { version = "2", features = ["serde-json", "tokio_rt"] }
napi-derive = "2"
tracing = "0.1"

[build-dependencies]
napi-build = "=2.1.3"

[profile.release]
lto = true
strip = "symbols"
