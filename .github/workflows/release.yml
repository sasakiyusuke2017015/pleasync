name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.host }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: npx napi build --platform --release --target x86_64-pc-windows-msvc

          - host: windows-latest
            target: aarch64-pc-windows-msvc
            build: npx napi build --platform --release --target aarch64-pc-windows-msvc

          - host: macos-14
            target: aarch64-apple-darwin
            build: npx napi build --platform --release --target aarch64-apple-darwin

          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: npx napi build --platform --release --target x86_64-unknown-linux-gnu

          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
            build: npx napi build --platform --release --target aarch64-unknown-linux-gnu --zig

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Zig (cross-compile)
        if: matrix.cross == true
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ matrix.target }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Build
        run: ${{ matrix.build }}
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: '*.node'
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move artifacts into npm dirs
        run: npx napi artifacts --dir artifacts

      - name: List npm dirs
        run: ls -lR npm

      - name: Determine dist-tag
        id: dist-tag
        run: |
          REF="${GITHUB_REF#refs/tags/}"
          if [[ "$REF" =~ -(beta|alpha|rc)\.[0-9]+$ ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
            echo "Detected pre-release tag: $REF -> dist-tag=beta"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "Detected stable tag: $REF -> dist-tag=latest"
          fi

      # npm publish が package.json の prepublishOnly フック経由で
      # napi prepublish -t npm を呼ぶ。これが platform sub-packages の
      # publish と main package の publish の両方をハンドルする。
      # 手動ループは不要（同じことを二重に実行して 403 になる）。
      - name: Publish (main + platform packages via prepublishOnly)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --tag ${{ steps.dist-tag.outputs.tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ steps.dist-tag.outputs.tag == 'beta' }}
